# Configurations
title:            Distributed by Design - Bailey's Tech Blog
longtitle:        Distributed by Design - Bailey's Tech Blog
author:           Bailey Sohyeon Cho
email:            bae12.jo@gmail.com
description: >
  Infra engineering notes on distributed systems, GPU clusters, and scale.

version:          1.0
gitbook_version:  3.2.3

url:              'https://bae12-jo.github.io'
baseurl:          ''
rss:              RSS

remote_theme: sighingnow/jekyll-gitbook

toc:
  enabled: true
  enabled_index: false
  h_min:   1
  h_max:   3

favicon_path:     /assets/gitbook/images/favicon.ico

markdown:         kramdown
kramdown:
  parse_block_html: true
  auto_ids:               true
  input:                  GFM
  math_engine:            mathjax
  smart_quotes:           lsquo,rsquo,ldquo,rdquo
  toc_levels:             1..6
  syntax_highlighter:     rouge
  syntax_highlighter_opts:
    guess_lang:           true

syntax_highlighter_style: monokai

markdown_ext:             markdown,mkdown,mkdn,mkd,md

permalink:                /:categories/:year-:month-:day-:title:output_ext

exclude:
  - _drafts

collections:
  pages:
    output: true
    permalink: /:collection/:path/
  authors:
    output: true
    permalink: /:collection/:path/

ordered_collections:
  - pages
  - authors

page_width: 800px

destination:      ./_site
incremental:      false
regenerate:       true

plugins:
  - jekyll-feed
  - jekyll-readme-index
  - jemoji

github_username: bae12-jo
linkedin_username: csbailey

extra_header_js:
  - assets/gitbook/lang-toggle.js
  - assets/gitbook/scroll-sync.js
